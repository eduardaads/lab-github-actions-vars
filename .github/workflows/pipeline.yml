name: Desafio de Variaveis e Escopos

on:
  workflow_dispatch:

env:
  APP_NAME: MinhaApp

jobs:
  build_app:
    runs-on: ubuntu-latest

    env:
      BUILD_VERSION: 1.0.0

    steps:
      - name: Passo 1
        run: |
          echo "App: $APP_NAME"
          echo "Versão: $BUILD_VERSION"
          echo "Temp: $STEP_TEMP"
        env:
          STEP_TEMP: valor_temporario

      - name: Passo 2
        run: |
          echo "App: $APP_NAME"
          echo "Versão: $BUILD_VERSION"
          echo "Temp: $STEP_TEMP"

      - name: Passo 3
        run: |
          echo "O usuário $GITHUB_ACTOR disparou este workflow no repositório $GITHUB_REPOSITORY. O sistema operacional é $RUNNER_OS."

      - name: Passo 4
        run: |
          RANDOM_NUM=$RANDOM
          echo "BUILD_HASH=$RANDOM_NUM" >> $GITHUB_ENV

      - name: Passo 5
        run: |
          echo "O hash gerado foi: $BUILD_HASH"

  deploy_app:
    runs-on: ubuntu-latest
    needs: build_app

    steps:
      - name: Passo 6
        run: |
          echo "URL: ${{ vars.URL_AMBIENTE }}"
          echo "TOKEN: ${{ secrets.API_TOKEN_PROD }}"
